<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>NoArousal Data CMS</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      window.CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "github",
            repo: "farrosfr/noarousal",
            branch: "main",
            site_domain: "noa.farros.co",
            auth_methods: ["token"]
          },
          media_folder: "public/uploads",
          public_folder: "/uploads",
          collections: [
            {
              name: "blog",
              label: "Blog",
              folder: "src/content/blog",
              create: true,
              slug: "{{slug}}",
              extension: "md",
              format: "frontmatter",
              fields: [
                { name: "title", label: "Title", widget: "string" },
                { name: "description", label: "Description", widget: "text" },
                { name: "date", label: "Publish Date", widget: "datetime" },
                { name: "readTime", label: "Read Time", widget: "string", default: "6 min read" },
                { name: "category", label: "Category", widget: "string" },
                {
                  name: "tags",
                  label: "Tags",
                  widget: "list",
                  field: { name: "tag", label: "Tag", widget: "string" }
                },
                {
                  name: "image",
                  label: "Hero Image",
                  widget: "object",
                  fields: [
                    { name: "url", label: "Image URL", widget: "string" },
                    { name: "alt", label: "Alt Text", widget: "string" },
                    { name: "credit", label: "Credit", widget: "string" },
                    { name: "creditUrl", label: "Credit URL", widget: "string" }
                  ]
                },
                { name: "body", label: "Article Body", widget: "markdown" }
              ]
            },
            {
              name: "accountability",
              label: "Accountability",
              files: [
                {
                  name: "public_log",
                  label: "Public Accountability Log",
                  file: "src/data/accountability.json",
                  format: "json",
                  fields: [
                    {
                      name: "journeyStart",
                      label: "Journey Start",
                      widget: "datetime",
                      hint: "Start of the public NoArousal journey."
                    },
                    {
                      name: "timeZone",
                      label: "Time Zone",
                      widget: "string",
                      hint: "Keep this as Asia/Jakarta unless the public streak timezone changes."
                    },
                    {
                      name: "entries",
                      label: "Public Events",
                      widget: "list",
                      summary: "{{fields.timestamp}} - {{fields.type}}",
                      fields: [
                        {
                          name: "type",
                          label: "Event Type",
                          widget: "select",
                          options: [
                            { label: "Relapse (loss)", value: "relapse" },
                            { label: "Refuse (win)", value: "refuse" }
                          ],
                          hint: "Relapse marks that day as a loss. Refuse records an urge resisted."
                        },
                        {
                          name: "timestamp",
                          label: "Event Timestamp",
                          widget: "datetime",
                          hint: "When the relapse or refusal happened."
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
