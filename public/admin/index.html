<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>NoArousal Data CMS</title>
    <script>
      (function setInitialTheme() {
        document.documentElement.dataset.theme = "light";
        document.documentElement.style.colorScheme = "light";
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f7f4ee;
        color: #151515;
        --sui-foreground-color-1-hsl: 0 0% 5%;
        --sui-foreground-color-2-hsl: 0 0% 18%;
        --sui-foreground-color-3-hsl: 0 0% 30%;
        --sui-background-color-1-hsl: 0 0% 100%;
        --sui-background-color-2-hsl: 36 24% 97%;
        --sui-background-color-3-hsl: 36 20% 94%;
        --sui-background-color-4-hsl: 36 16% 90%;
        --sui-background-color-5-hsl: 36 12% 82%;
      }

      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #0b0d10;
        color: #f7f2ea;
        --sui-foreground-color-1-hsl: 36 28% 96%;
        --sui-foreground-color-2-hsl: 36 18% 82%;
        --sui-foreground-color-3-hsl: 36 12% 70%;
        --sui-background-color-1-hsl: 210 10% 8%;
        --sui-background-color-2-hsl: 210 10% 10%;
        --sui-background-color-3-hsl: 210 10% 13%;
        --sui-background-color-4-hsl: 210 10% 16%;
        --sui-background-color-5-hsl: 210 10% 26%;
      }

      #nc-root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      #nc-root,
      #nc-root * {
        visibility: visible;
      }

      html[data-theme="light"] #nc-root,
      html[data-theme="light"] #nc-root .sui.app-shell,
      html[data-theme="light"] #nc-root .main {
        color: #151515;
        background-color: #f7f4ee;
      }

      html[data-theme="dark"] #nc-root,
      html[data-theme="dark"] #nc-root .sui.app-shell,
      html[data-theme="dark"] #nc-root .main {
        color: #f7f2ea;
        background-color: #0f1318;
      }

      .cms-fallback {
        display: grid;
        position: fixed;
        z-index: 2147483646;
        inset: 0;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        pointer-events: none;
      }

      .cms-fallback__inner {
        width: min(460px, 100%);
        border: 1px solid rgba(21, 21, 21, 0.14);
        border-radius: 8px;
        padding: 24px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
        pointer-events: auto;
      }

      html[data-theme="dark"] .cms-fallback__inner {
        border-color: rgba(247, 242, 234, 0.16);
        background: #11151b;
      }

      .cms-fallback h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .cms-fallback p {
        margin: 0;
        color: #514b44;
        line-height: 1.55;
      }

      html[data-theme="dark"] .cms-fallback p {
        color: #b9b0a3;
      }

      .cms-fallback p + p {
        margin-top: 12px;
      }

      .cms-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .cms-actions button,
      .cms-actions a {
        border: 1px solid rgba(21, 21, 21, 0.18);
        border-radius: 999px;
        padding: 9px 12px;
        color: #151515;
        background: #f2eee7;
        font: 600 13px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-decoration: none;
        cursor: pointer;
      }

      html[data-theme="dark"] .cms-actions button,
      html[data-theme="dark"] .cms-actions a {
        border-color: rgba(247, 242, 234, 0.18);
        color: #f7f2ea;
        background: #1d232d;
      }

      html[data-cms-loaded="true"] .cms-fallback {
        display: none;
      }

      html[data-cms-blank="true"] .cms-fallback {
        inset: 0;
        display: grid;
        min-height: 100vh;
        padding: 24px;
      }

      html[data-cms-blank="true"] .cms-fallback__inner {
        width: min(560px, 100%);
        padding: 24px;
      }

      html[data-cms-blank="true"] .cms-fallback h1,
      html[data-cms-blank="true"] .cms-fallback p + p,
      html[data-cms-blank="true"] .cms-actions {
        display: block;
      }

      html[data-cms-blank="true"] .cms-actions {
        display: flex;
      }

      .quick-refuse {
        display: none !important;
        position: fixed !important;
        z-index: 2147483647 !important;
        bottom: 16px !important;
        right: 16px !important;
        width: min(340px, calc(100vw - 32px)) !important;
        border: 1px solid rgba(21, 21, 21, 0.2) !important;
        border-radius: 8px !important;
        padding: 14px !important;
        background: #ffffff !important;
        color: #151515 !important;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2) !important;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
      }

      html[data-cms-auth="true"] .quick-refuse {
        display: block !important;
      }

      html[data-theme="dark"] .quick-refuse {
        background: #1d232d !important;
        color: #f7f2ea !important;
        border-color: rgba(247, 242, 234, 0.2) !important;
      }

      .quick-refuse strong {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
        color: inherit !important;
      }

      .quick-refuse p {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.45;
        color: inherit !important;
        opacity: 0.8;
      }

      .quick-refuse button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 11px 14px;
        color: #ffffff !important;
        background: #151515 !important;
        font: 700 13px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      html[data-theme="dark"] .quick-refuse button {
        background: #f7f2ea !important;
        color: #151515 !important;
      }

      .quick-refuse button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .quick-refuse__status {
        min-height: 17px;
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
        color: inherit !important;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <aside class="quick-refuse" aria-label="Quick accountability shortcut">
      <strong>Shortcut</strong>
      <p>Same as Accountability -> add event -> Refuse (win) -> now -> save.</p>
      <button id="quickRefuseButton" type="button">Refuse to lose (now)</button>
      <div class="quick-refuse__status" id="quickRefuseStatus" role="status" aria-live="polite"></div>
    </aside>
    <div class="cms-fallback" id="cmsFallback">
      <div class="cms-fallback__inner">
        <h1>NoArousal CMS</h1>
        <p id="cmsStatus">Loading the editor...</p>
        <p>If this stays here, refresh once or check the browser console for the exact loading error.</p>
        <div class="cms-actions">
          <button id="cmsResetButton" type="button">Reset CMS cache</button>
          <a href="/admin/?reset=1">Open clean</a>
        </div>
      </div>
    </div>
    <div id="nc-root"></div>
    <script>
      window.CMS_MANUAL_INIT = true;
      window.checkCmsAuth = function () {
        const rootText = document.getElementById("nc-root")?.innerText?.trim() || "";
        const isAuth = rootText && !/sign in|work with local|sveltia cms/i.test(rootText) && /blog|accountability/i.test(rootText);
        
        if (isAuth) {
          document.documentElement.dataset.cmsAuth = "true";
        } else {
          delete document.documentElement.dataset.cmsAuth;
        }
      };

      window.setCmsLoaded = function () {
        window.setTimeout(function () {
          const rootText = document.getElementById("nc-root")?.innerText?.trim() || "";
          const hasUsableUi = /sign in|work with local|sveltia cms/i.test(rootText);

          if (!hasUsableUi) {
            delete document.documentElement.dataset.cmsLoaded;
            document.documentElement.dataset.cmsBlank = "true";
            showCmsStatus("Sveltia loaded, but your PC browser rendered the CMS area blank. Use Reset CMS cache, then reload. If it stays blank, disable forced dark mode or extensions for this site.");
            return;
          }

          delete document.documentElement.dataset.cmsBlank;
          document.documentElement.dataset.cmsLoaded = "true";
          window.checkCmsAuth();
        }, 500);
      };
      window.showCmsStatus = function (message) {
        const status = document.getElementById("cmsStatus");
        if (status) status.textContent = message;
      };
      window.setInterval(function () {
        if (document.documentElement.dataset.theme !== "light") {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
        window.checkCmsAuth();
      }, 750);

      async function clearCmsCache() {
        showCmsStatus("Clearing CMS cache...");
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch {}

        try {
          if (window.indexedDB?.databases) {
            const databases = await indexedDB.databases();
            await Promise.all(databases.map((database) => database.name && new Promise((resolve) => {
              const request = indexedDB.deleteDatabase(database.name);
              request.onsuccess = request.onerror = request.onblocked = resolve;
            })));
          }
        } catch {}

        try {
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch {}

        window.location.href = "/admin/?fresh=" + Date.now();
      }

      document.getElementById("cmsResetButton")?.addEventListener("click", clearCmsCache);
      if (new URLSearchParams(window.location.search).get("reset") === "1") clearCmsCache();
      window.setTimeout(function () {
        if (!document.documentElement.dataset.cmsLoaded && !document.documentElement.dataset.cmsBlank) {
          const rootText = document.getElementById("nc-root")?.innerText?.trim() || "";
          if (!/sign in|work with local|sveltia cms/i.test(rootText)) {
            document.documentElement.dataset.cmsBlank = "true";
            showCmsStatus("The CMS did not produce visible UI on this PC browser. Use Reset CMS cache, or try this page with extensions disabled.");
          }
        }
      }, 6000);

      function formatJakartaTimestamp(date = new Date()) {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Jakarta",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(date);
        const value = (type) => parts.find((part) => part.type === type)?.value || "00";

        return `${value("year")}-${value("month")}-${value("day")}T${value("hour")}:${value("minute")}:00`;
      }

      function decodeBase64Utf8(value) {
        const binary = atob(value.replace(/\n/g, ""));
        const bytes = Uint8Array.from(binary, (character) => character.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      function encodeBase64Utf8(value) {
        const bytes = new TextEncoder().encode(value);
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }

      async function getQuickRefuseToken() {
        try {
          const sveltiaUser = JSON.parse(localStorage.getItem("sveltia-cms.user") || "{}");
          if (sveltiaUser.token) return sveltiaUser.token;
        } catch (e) {}

        const savedToken = localStorage.getItem("noa-github-token");
        if (savedToken) return savedToken;

        const token = window.prompt("Paste a GitHub token with repository contents write access.");
        if (!token) return "";
        localStorage.setItem("noa-github-token", token.trim());
        return token.trim();
      }

      async function addRefuseNow() {
        const button = document.getElementById("quickRefuseButton");
        const status = document.getElementById("quickRefuseStatus");
        const setStatus = (message) => {
          if (status) status.textContent = message;
        };

        if (!button) return;
        button.disabled = true;
        setStatus("Preparing refuse event...");

        try {
          const token = await getQuickRefuseToken();
          if (!token) {
            setStatus("No token provided.");
            return;
          }

          const apiUrl = "https://api.github.com/repos/farrosfr/noarousal/contents/src/data/accountability.json?ref=main";
          const headers = {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "X-GitHub-Api-Version": "2022-11-28"
          };

          setStatus("Loading accountability log...");
          const currentResponse = await fetch(apiUrl, { headers });
          if (!currentResponse.ok) throw new Error(`GitHub read failed (${currentResponse.status})`);
          const currentFile = await currentResponse.json();
          const data = JSON.parse(decodeBase64Utf8(currentFile.content));
          const entries = Array.isArray(data.entries) ? data.entries : [];
          const timestamp = formatJakartaTimestamp();
          data.entries = [{ type: "refuse", timestamp }, ...entries];

          setStatus("Saving refuse event...");
          const updateResponse = await fetch(apiUrl, {
            method: "PUT",
            headers,
            body: JSON.stringify({
              message: "Update Accountability “public_log”",
              content: encodeBase64Utf8(`${JSON.stringify(data, null, 2)}\n`),
              sha: currentFile.sha,
              branch: "main"
            })
          });

          if (!updateResponse.ok) {
            if (updateResponse.status === 401 || updateResponse.status === 403) localStorage.removeItem("noa-github-token");
            const error = await updateResponse.json().catch(() => ({}));
            throw new Error(error.message || `GitHub save failed (${updateResponse.status})`);
          }

          setStatus(`Saved refuse win at ${timestamp}.`);
        } catch (error) {
          console.error(error);
          setStatus(error.message || "Could not save refuse event.");
        } finally {
          button.disabled = false;
        }
      }

      document.getElementById("quickRefuseButton")?.addEventListener("click", addRefuseNow);
    </script>
    <script src="/admin/sveltia-cms.js?v=20260611" onerror="showCmsStatus('Could not load the local Sveltia CMS script. Refresh once and check the browser console.')"></script>
    <script>
      (async function initCms() {
        if (!window.CMS) {
          showCmsStatus("Sveltia CMS did not finish loading. Try refreshing once.");
          return;
        }

        try {
          await window.CMS.init({
            config: {
              load_config_file: false,
              backend: {
                name: "github",
                repo: "farrosfr/noarousal",
                branch: "main",
                site_domain: "noa.farros.co",
                auth_methods: ["token"]
              },
              media_folder: "public/uploads",
              public_folder: "/uploads",
              collections: [
                {
                  name: "blog",
                  label: "Blog",
                  folder: "src/content/blog",
                  create: true,
                  slug: "{{slug}}",
                  extension: "md",
                  format: "frontmatter",
                  fields: [
                    { name: "title", label: "Title", widget: "string" },
                    { name: "description", label: "Description", widget: "text" },
                    { name: "date", label: "Publish Date", widget: "datetime" },
                    { name: "readTime", label: "Read Time", widget: "string", default: "6 min read" },
                    { name: "category", label: "Category", widget: "string" },
                    {
                      name: "tags",
                      label: "Tags",
                      widget: "list",
                      field: { name: "tag", label: "Tag", widget: "string" }
                    },
                    {
                      name: "image",
                      label: "Hero Image",
                      widget: "object",
                      fields: [
                        { name: "url", label: "Image URL", widget: "string" },
                        { name: "alt", label: "Alt Text", widget: "string" },
                        { name: "credit", label: "Credit", widget: "string" },
                        { name: "creditUrl", label: "Credit URL", widget: "string" }
                      ]
                    },
                    { name: "body", label: "Article Body", widget: "markdown" }
                  ]
                },
                {
                  name: "accountability",
                  label: "Accountability",
                  files: [
                    {
                      name: "public_log",
                      label: "Public Accountability Log",
                      file: "src/data/accountability.json",
                      format: "json",
                      fields: [
                        {
                          name: "journeyStart",
                          widget: "hidden",
                          default: "2026-06-06T12:00:00+07:00"
                        },
                        {
                          name: "timeZone",
                          widget: "hidden",
                          default: "Asia/Jakarta"
                        },
                        {
                          name: "entries",
                          label: "Events",
                          widget: "list",
                          summary: "{{fields.timestamp}} - {{fields.type}}",
                          collapsed: true,
                          minimize_collapsed: true,
                          add_to_top: true,
                          hint: "Newest events stay at the top. Add relapse/refusal timestamps here.",
                          fields: [
                            {
                              name: "type",
                              label: "Event Type",
                              widget: "select",
                              options: [
                                { label: "Relapse (loss)", value: "relapse" },
                                { label: "Refuse (win)", value: "refuse" }
                              ],
                              hint: "Relapse marks that day as a loss. Refuse records an urge resisted."
                            },
                            {
                              name: "timestamp",
                              label: "Event Timestamp",
                              widget: "datetime",
                              hint: "When the relapse or refusal happened."
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          });
          setCmsLoaded();
        } catch (error) {
          console.error(error);
          showCmsStatus("Sveltia CMS failed to initialize. Open the browser console for the exact error.");
        }
      })();
    </script>
  </body>
</html>
