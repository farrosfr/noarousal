<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>NoArousal Data CMS</title>
    <script>
      (function setInitialTheme() {
        try {
          const savedTheme = localStorage.getItem("noa-cms-theme");
          document.documentElement.dataset.theme = savedTheme || "light";
          document.documentElement.style.colorScheme = savedTheme || "light";
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f7f4ee;
        color: #151515;
      }

      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #0b0d10;
        color: #f7f2ea;
      }

      .cms-fallback {
        display: grid;
        position: fixed;
        z-index: 2147483646;
        inset: 0;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        pointer-events: none;
      }

      .cms-fallback__inner {
        width: min(460px, 100%);
        border: 1px solid rgba(21, 21, 21, 0.14);
        border-radius: 8px;
        padding: 24px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
        pointer-events: auto;
      }

      html[data-theme="dark"] .cms-fallback__inner {
        border-color: rgba(247, 242, 234, 0.16);
        background: #11151b;
      }

      .cms-fallback h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .cms-fallback p {
        margin: 0;
        color: #514b44;
        line-height: 1.55;
      }

      html[data-theme="dark"] .cms-fallback p {
        color: #b9b0a3;
      }

      .cms-fallback p + p {
        margin-top: 12px;
      }

      .cms-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .cms-actions button,
      .cms-actions a {
        border: 1px solid rgba(21, 21, 21, 0.18);
        border-radius: 999px;
        padding: 9px 12px;
        color: #151515;
        background: #f2eee7;
        font: 600 13px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-decoration: none;
        cursor: pointer;
      }

      html[data-theme="dark"] .cms-actions button,
      html[data-theme="dark"] .cms-actions a {
        border-color: rgba(247, 242, 234, 0.18);
        color: #f7f2ea;
        background: #1d232d;
      }

      .cms-theme-toggle {
        position: fixed;
        z-index: 2147483647;
        inset: 12px 12px auto auto;
        border: 1px solid rgba(21, 21, 21, 0.18);
        border-radius: 999px;
        padding: 8px 12px;
        color: #151515;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
        font: 600 13px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      html[data-theme="dark"] .cms-theme-toggle {
        border-color: rgba(247, 242, 234, 0.18);
        color: #f7f2ea;
        background: rgba(17, 21, 27, 0.92);
      }

      html[data-cms-loaded="true"] .cms-fallback {
        inset: auto auto 16px 16px;
        display: block;
        min-height: 0;
        padding: 0;
      }

      html[data-cms-loaded="true"] .cms-fallback__inner {
        width: min(360px, calc(100vw - 32px));
        padding: 14px;
      }

      html[data-cms-loaded="true"] .cms-fallback h1,
      html[data-cms-loaded="true"] .cms-fallback p + p,
      html[data-cms-loaded="true"] .cms-actions {
        display: none;
      }

      html[data-cms-loaded="true"] .cms-fallback p {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <button class="cms-theme-toggle" id="cmsThemeToggle" type="button">Light</button>
    <div class="cms-fallback" id="cmsFallback">
      <div class="cms-fallback__inner">
        <h1>NoArousal CMS</h1>
        <p id="cmsStatus">Loading the editor...</p>
        <p>If this stays here, refresh once or check the browser console for the exact loading error.</p>
        <div class="cms-actions">
          <button id="cmsResetButton" type="button">Reset CMS cache</button>
          <a href="/admin/?reset=1">Open clean</a>
        </div>
      </div>
    </div>
    <div id="nc-root"></div>
    <script>
      window.CMS_MANUAL_INIT = true;
      window.setCmsLoaded = function () {
        document.documentElement.dataset.cmsLoaded = "true";
        showCmsStatus("CMS loaded. If the editor area is still blank, use Reset CMS cache.");
      };
      window.setCmsTheme = function (theme) {
        const nextTheme = theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = nextTheme;
        document.documentElement.style.colorScheme = nextTheme;
        const toggle = document.getElementById("cmsThemeToggle");
        if (toggle) toggle.textContent = nextTheme === "dark" ? "Dark" : "Light";
        try {
          localStorage.setItem("noa-cms-theme", nextTheme);
        } catch {}
      };
      window.showCmsStatus = function (message) {
        const status = document.getElementById("cmsStatus");
        if (status) status.textContent = message;
      };
      document.getElementById("cmsThemeToggle")?.addEventListener("click", function () {
        setCmsTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      });
      setCmsTheme(document.documentElement.dataset.theme);

      async function clearCmsCache() {
        showCmsStatus("Clearing CMS cache...");
        try {
          const keepTheme = localStorage.getItem("noa-cms-theme") || "light";
          localStorage.clear();
          sessionStorage.clear();
          localStorage.setItem("noa-cms-theme", keepTheme);
        } catch {}

        try {
          if (window.indexedDB?.databases) {
            const databases = await indexedDB.databases();
            await Promise.all(databases.map((database) => database.name && new Promise((resolve) => {
              const request = indexedDB.deleteDatabase(database.name);
              request.onsuccess = request.onerror = request.onblocked = resolve;
            })));
          }
        } catch {}

        try {
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch {}

        window.location.href = "/admin/?fresh=" + Date.now();
      }

      document.getElementById("cmsResetButton")?.addEventListener("click", clearCmsCache);
      if (new URLSearchParams(window.location.search).get("reset") === "1") clearCmsCache();
    </script>
    <script src="/admin/sveltia-cms.js?v=20260611" onerror="showCmsStatus('Could not load the local Sveltia CMS script. Refresh once and check the browser console.')"></script>
    <script>
      (async function initCms() {
        if (!window.CMS) {
          showCmsStatus("Sveltia CMS did not finish loading. Try refreshing once.");
          return;
        }

        try {
          await window.CMS.init({
            config: {
              load_config_file: false,
              backend: {
                name: "github",
                repo: "farrosfr/noarousal",
                branch: "main",
                site_domain: "noa.farros.co",
                auth_methods: ["token"]
              },
              media_folder: "public/uploads",
              public_folder: "/uploads",
              collections: [
                {
                  name: "blog",
                  label: "Blog",
                  folder: "src/content/blog",
                  create: true,
                  slug: "{{slug}}",
                  extension: "md",
                  format: "frontmatter",
                  fields: [
                    { name: "title", label: "Title", widget: "string" },
                    { name: "description", label: "Description", widget: "text" },
                    { name: "date", label: "Publish Date", widget: "datetime" },
                    { name: "readTime", label: "Read Time", widget: "string", default: "6 min read" },
                    { name: "category", label: "Category", widget: "string" },
                    {
                      name: "tags",
                      label: "Tags",
                      widget: "list",
                      field: { name: "tag", label: "Tag", widget: "string" }
                    },
                    {
                      name: "image",
                      label: "Hero Image",
                      widget: "object",
                      fields: [
                        { name: "url", label: "Image URL", widget: "string" },
                        { name: "alt", label: "Alt Text", widget: "string" },
                        { name: "credit", label: "Credit", widget: "string" },
                        { name: "creditUrl", label: "Credit URL", widget: "string" }
                      ]
                    },
                    { name: "body", label: "Article Body", widget: "markdown" }
                  ]
                },
                {
                  name: "accountability",
                  label: "Accountability",
                  files: [
                    {
                      name: "public_log",
                      label: "Public Accountability Log",
                      file: "src/data/accountability.json",
                      format: "json",
                      fields: [
                        {
                          name: "journeyStart",
                          widget: "hidden",
                          default: "2026-06-06T12:00:00+07:00"
                        },
                        {
                          name: "timeZone",
                          widget: "hidden",
                          default: "Asia/Jakarta"
                        },
                        {
                          name: "entries",
                          label: "Events",
                          widget: "list",
                          summary: "{{fields.timestamp}} - {{fields.type}}",
                          collapsed: true,
                          minimize_collapsed: true,
                          add_to_top: true,
                          hint: "Newest events stay at the top. Add relapse/refusal timestamps here.",
                          fields: [
                            {
                              name: "type",
                              label: "Event Type",
                              widget: "select",
                              options: [
                                { label: "Relapse (loss)", value: "relapse" },
                                { label: "Refuse (win)", value: "refuse" }
                              ],
                              hint: "Relapse marks that day as a loss. Refuse records an urge resisted."
                            },
                            {
                              name: "timestamp",
                              label: "Event Timestamp",
                              widget: "datetime",
                              hint: "When the relapse or refusal happened."
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          });
          setCmsLoaded();
        } catch (error) {
          console.error(error);
          showCmsStatus("Sveltia CMS failed to initialize. Open the browser console for the exact error.");
        }
      })();
    </script>
  </body>
</html>
